<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MemeBox</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>MemeBox</h1>
    <p>Click to play • Press 1-9 for shortcuts</p>
  </header>

  
  <div class="filter-bar">
    <button class="filter-btn active" data-country="all">🌍 All</button>
    <button class="filter-btn" data-country="usa">🇺🇸 USA</button>
    <button class="filter-btn" data-country="uk">🇬🇧 UK</button>
    <button class="filter-btn" data-country="asia">🌏 Asia</button>
    <button class="filter-btn" data-country="global">🌐 Global</button>
  </div>

  
  <div class="meme-grid">
    
   
    <div class="meme-card" data-country="usa">
      <div class="video-container">
        <video id="meme1" loop muted>
          <source src="memes/wednesday.mp4" type="video/mp4">
        </video>
      </div>
      <div class="card-info">
        <h3>It is Wednesday My Dudes</h3>
        <span class="country-tag">🇺🇸 USA</span>
      </div>
      <div class="controls">
        <button class="play-btn" onclick="toggleMeme('meme1', this)">
          ▶️ Play
        </button>
        <div class="volume-control">
          <span class="volume-icon">🔊</span>
          <input type="range" class="volume-slider" min="0" max="100" value="70" 
                 oninput="setVolume('meme1', this.value)">
        </div>
      </div>
    </div>

    
    <div class="meme-card" data-country="asia">
      <div class="video-container">
        <video id="meme2" loop muted>
          <source src="memes/emotional-damage.mp4" type="video/mp4">
        </video>
      </div>
      <div class="card-info">
        <h3>Emotional Damage</h3>
        <span class="country-tag">🌏 Asia</span>

      </div>
      <div class="controls">
        <button class="play-btn" onclick="toggleMeme('meme2', this)">
          ▶️ Play
        </button>

        <div class="volume-control">
          <span class="volume-icon">🔊</span>
          <input type="range" class="volume-slider" min="0" max="100" value="70" 
                 oninput="setVolume('meme2', this.value)">
        </div>
      </div>
    </div>

        <div class="volume-control">

          <span class="volume-icon">🔊</span>

                 oninput="setVolume('meme3', this.value)">
